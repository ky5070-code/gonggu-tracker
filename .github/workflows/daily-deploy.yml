name: 🍼 매일 공구 데이터 갱신 & 배포

on:
  # 매일 오전 8시 (한국시간 = UTC+9, 즉 UTC 23시)
  schedule:
    - cron: '0 23 * * *'

  # 수동 실행 버튼 (GitHub Actions 탭에서 바로 실행 가능)
  workflow_dispatch:

  # main 브랜치에 push할 때도 자동 배포
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 체크아웃
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: 🐍 Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 데이터 빌드 & HTML 생성
      - name: 🔄 공구 데이터 갱신
        run: |
          echo "빌드 시작: $(date '+%Y-%m-%d %H:%M:%S KST' --date='9 hours')"
          python build_site.py
          echo "빌드 완료"
          ls -lh index.html data/

      # 4. 변경된 index.html을 저장소에 커밋
      - name: 💾 업데이트된 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --staged --quiet || git commit -m "🍼 공구 데이터 자동 업데이트 $(date '+%Y-%m-%d' --date='9 hours')"
          git push

      # 5. GitHub Pages에 배포
      - name: 🚀 GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,scraper.py,build_site.py,influencers.json'
